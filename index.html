<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0e1a" />
    <title>PokéBattle Arena</title>
    <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin />
    <link rel="preconnect" href="https://pokeapi.co" crossorigin />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrapper">
      <header class="topbar">
        <div class="brand">
          <span class="logo-mark" aria-hidden="true"></span>
          <div class="brand-text">
            <h1>PokéBattle <span class="brand-accent">Arena</span></h1>
            <span class="small tagline">Gen I · powered by PokéAPI</span>
          </div>
        </div>
        <div class="topbar-right">
          <div id="scoreboard" class="scoreboard">
            <span class="chip" title="Battles won">🏆 <b id="winCount">0</b></span>
            <span class="chip" title="Money">₽ <b id="moneyCount">0</b></span>
            <span id="badgeStrip" class="badge-strip" title="Badges"></span>
          </div>
          <div class="audio-controls">
            <button id="muteBtn" class="icon-btn" title="Mute">🔊</button>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.2" aria-label="Volume" />
          </div>
        </div>
      </header>

      <section class="screen">
        <div class="themefx" id="themefx" aria-hidden="true"></div>
        <div id="vfx" class="vfx" aria-hidden="true"></div>
        <canvas id="fxCanvas"></canvas>

        <!-- Arena -->
        <div class="arena">
          <div class="enemy">
            <div class="plate"></div>
            <img id="enemySprite" alt="enemy" src="" />
          </div>
          <div class="player">
            <div class="plate"></div>
            <img id="playerSprite" alt="player" src="" />
          </div>
        </div>

        <!-- HUD -->
        <div class="hud">
          <div id="enemyCard" class="card statusbox enemy-box">
            <div class="statusbox-top">
              <span id="enemyName" class="mon-name">—</span>
              <span class="lv-badge">Lv<span id="enemyLevel">—</span></span>
              <span id="enemyTypes" class="type-badges"></span>
              <span id="enemyStatus" class="status-pill hidden"></span>
            </div>
            <div class="bar-row">
              <span class="bar-label">HP</span>
              <div class="hpbar"><div id="enemyHpFill" class="fill"></div></div>
            </div>
            <div class="statusbox-bottom">
              <span id="enemyParty" class="poke-dots"></span>
              <span id="enemyHpText" class="small hp-text"></span>
            </div>
          </div>

          <div id="playerCard" class="card statusbox player-box">
            <div class="statusbox-top">
              <span id="playerName" class="mon-name">—</span>
              <span class="lv-badge">Lv<span id="playerLevel">—</span></span>
              <span id="playerTypes" class="type-badges"></span>
              <span id="playerStatus" class="status-pill hidden"></span>
            </div>
            <div class="bar-row">
              <span class="bar-label">HP</span>
              <div class="hpbar"><div id="playerHpFill" class="fill"></div></div>
            </div>
            <div class="statusbox-bottom">
              <span id="playerParty" class="poke-dots"></span>
              <span id="playerHpText" class="small hp-text"></span>
            </div>
            <div class="bar-row xp-row">
              <span class="bar-label">XP</span>
              <div class="xpbar"><div id="playerXpFill" class="fill"></div></div>
            </div>
          </div>
        </div>

        <!-- Banner for level-up / evolution / victory flourishes -->
        <div id="banner" class="banner hidden"></div>

        <!-- Message + menus -->
        <div id="msgBox" class="msgbox">
          <div id="textLine" class="textline">
            <span id="textContent"></span><span class="caret"></span>
          </div>

          <div id="menu" class="panel hidden">
            <div class="menu-grid">
              <button id="fightBtn" class="cmd cmd-fight"><span class="cmd-ico">⚔</span>FIGHT</button>
              <button id="ballInfoBtn" class="cmd cmd-bag"><span class="cmd-ico">🎒</span>BAG</button>
              <button id="swapBtn" class="cmd cmd-pkmn"><span class="cmd-ico">🐾</span>PKMN</button>
              <button id="runBtn" class="cmd cmd-run"><span class="cmd-ico">🏃</span>RUN</button>
            </div>
            <label class="auto-toggle small">
              <input type="checkbox" id="autoToggle" /> <span>Auto-play</span>
            </label>
          </div>

          <div id="movesView" class="panel hidden">
            <div class="panel-head">
              <h3>Choose a move</h3>
              <button id="backBtn" class="small ghost">◂ Back</button>
            </div>
            <div id="movesGrid" class="moves-grid"></div>
          </div>

          <div id="swapView" class="panel hidden">
            <div class="panel-head">
              <h3>Your team</h3>
              <div class="panel-head-actions">
                <button id="boxOpenBtn" class="small ghost">PC Box</button>
                <button id="swapBackBtn" class="small ghost">◂ Back</button>
              </div>
            </div>
            <div id="partyList" class="party-list"></div>
          </div>
        </div>
      </section>

      <footer class="small foot">
        Fan-made demo. Only Gen I Pokémon &amp; moves. Sprites &amp; data from PokéAPI.
      </footer>
    </div>

    <!-- Title screen -->
    <div id="titleScreen" class="title-screen">
      <div class="title-inner">
        <div class="title-logo">
          <span class="title-poke">Poké</span><span class="title-battle">Battle</span>
          <span class="title-arena">ARENA</span>
        </div>
        <p class="title-sub">A Generation I battle experience</p>
        <div class="title-actions">
          <button id="newGameBtn" class="title-btn primary">New Adventure</button>
          <button id="continueBtn" class="title-btn hidden">Continue</button>
        </div>
        <p class="title-hint small">Choose a starter, battle wild Pokémon &amp; trainers, evolve your team.</p>
      </div>
      <div class="title-orbs" aria-hidden="true"></div>
    </div>

    <audio id="battleMusic" loop src="assets/sfx/music/wild-battle.ogg"></audio>
    <script src="dist/bundle.js"></script>
  </body>
</html>
